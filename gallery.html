<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xinet Image Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #fff;
        }
        .stat-label {
            color: rgba(255,255,255,0.8);
            font-size: 0.9em;
            margin-top: 5px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .image-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .image-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-title {
            padding: 15px;
            font-size: 0.9em;
            color: #333;
            word-break: break-all;
            background: #f9f9f9;
        }
        .new-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff6b6b;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .empty-state {
            text-align: center;
            color: white;
            padding: 60px 20px;
        }
        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        .empty-state h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        .refresh-info {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 0.9em;
            padding: 20px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Xinet Image Gallery</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="total-images">0</div>
                    <div class="stat-label">Totale immagini</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="last-update">--:--</div>
                    <div class="stat-label">Ultimo aggiornamento</div>
                </div>
            </div>
        </div>

        <div id="gallery-container" class="gallery"></div>
        
        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-state-icon">🖼️</div>
            <h2>Nessuna immagine</h2>
            <p>Le immagini appariranno qui quando verranno salvate...</p>
        </div>

        <div class="refresh-info">
            ⏱️ Aggiornamento automatico ogni 2 secondi
        </div>
    </div>

    <script>
        let lastImages = [];
        let newImageCount = 0;

        async function loadImages() {
            try {
                const response = await fetch('/api/images');
                const data = await response.json();
                
                updateGallery(data.images);
                document.getElementById('total-images').textContent = data.images.length;
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString('it-IT');
            } catch (error) {
                console.error('Errore nel caricamento:', error);
            }
        }

        function updateGallery(images) {
            const container = document.getElementById('gallery-container');
            const emptyState = document.getElementById('empty-state');

            if (images.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            container.style.display = 'grid';
            emptyState.style.display = 'none';

            // Identifica le nuove immagini
            const newImages = images.filter(img => !lastImages.includes(img));
            
            // Ricrea la galleria
            container.innerHTML = images.map((image, index) => {
                const isNew = newImages.includes(image);
                return `
                    <div class="image-card" style="position: relative;">
                        ${isNew ? '<div class="new-badge">🆕 NUOVO</div>' : ''}
                        <div class="image-container">
                            <img src="/images/${encodeURIComponent(image)}" alt="${image}" loading="lazy">
                        </div>
                        <div class="image-title">${image}</div>
                    </div>
                `;
            }).join('');

            lastImages = images;
        }

        // Carica le immagini subito
        loadImages();

        // Aggiorna ogni 2 secondi
        setInterval(loadImages, 2000);
    </script>
</body>
</html>
